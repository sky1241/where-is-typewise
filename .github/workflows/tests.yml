name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt   # already pulls in requirements.txt

      - name: Run pytest (warnings as errors)
        env:
          # Tests must not require live credentials.
          ANTHROPIC_API_KEY: ""
          REDDIT_CLIENT_ID: ""
          REDDIT_SECRET: ""
        run: python -m pytest tests/ -W error -v
