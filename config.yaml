keywords:
  - "AI customer service"
  - "AI customer support"
  - "Intercom Fin alternative"
  - "Zendesk AI alternative"
  - "Decagon"
  - "Sierra AI"
  - "best AI support tool"
  - "AI agent customer support"

reddit:
  subreddits:
    - CustomerSuccess
    - SaaS
    - CustomerService
    - ExperiencedDevs
  posts_per_sub: 50

hackernews:
  max_results: 50
  # by_date: rank by recency (/search_by_date) instead of relevance (/search) —
  # a live radar must surface fresh buyer conversations, not years-old popular posts.
  by_date: true
  # since_days: drop stories older than this (Algolia created_at_i filter). Keeps the
  # radar fresh; the scorer still ranks relevance within the recent window.
  since_days: 365

dach:
  # Empty keywords list = no filter. DACH RSS feeds are general startup/tech news;
  # a strict CS-AI filter usually returns 0 hits per day. We let everything through
  # and rely on the scorer + locale tag to surface the relevant entries.
  keywords: []
  # feeds: omitted -> dach.DEFAULT_FEEDS (t3n.de, deutsche-startups.de, siliconcanals.com)

competitors:
  - Intercom
  - Fin
  - Zendesk
  - Decagon
  - Sierra
  - Ada
  - Forethought
  - Kustomer
  - Lorikeet
  - Crisp
